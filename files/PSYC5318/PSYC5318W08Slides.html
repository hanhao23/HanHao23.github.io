### Statistical Modeling in Experimental Psychology
# W08 Path Models
## A Bridge from Regression to SEM

#### Han Hao @ Tarleton State University

---

## Agenda

- Reframe regression as a path model  
- Why path models are "better" (conceptually + practically)
- Mediation in a *single* model (reproduce your Unsworth mediation assignment in PSYC5316)
- A more complex path model (3 mediators)
- Preview: MIMIC as the “first step” into SEM (latent + observed causes)

---

## From regression to path models

#### Regression mindset:
- One outcome at a time: `\(Y \sim X_1 + X_2 + \cdots\)`
- Interpretation is conditional mean: **holding other predictors constant, the predicted value (mean) of Y when X is ...**

#### Path model mindset:
- Multiple .red[endogenous] variables are modeled **simultaneously**
- A single set of assumed relationships implies a **model-implied covariance matrix**  
- The model becomes a *testable theory that illustrates complex relationships*

---

## Overview

A **path model** is a set of regression equations and covariance assumptions among the target (manifest) variables, estimated **simultaneously**.

Terms of variables:
- **.blue[Exogenous]**: not predicted in the model (has no incoming single arrows in a diagram)
  - Similar to "Xs" in a regression
- **.red[Endogenous]**: predicted by something (has incoming single arrows in a diagram)
  - Similar to "Y" in a regression, but still different

---

## Overview

A **path model** is a set of regression equations and covariance assumptions among the target (manifest) variables, estimated **simultaneously**.

Key parameters estimated in a path model:
- **Directional paths** (regression relationships)
- **Covariances** among **.blue[exogenous]** variables
- **Residual variances** (and sometimes residual covariances) of **.red[endogenous]** variables
- **Intercepts** of variables (that are often omitted)

---

## Diagram grammar (universal)

- Rectangle = observed variable  
- Single-headed (straight) arrow `\(X \rightarrow Y\)` = regression effect  
- Double-headed (curved) arrow `\(X \leftrightarrow Z\)` = covariance (or correlation)
- Small “error” circle → endogenous variable = estimated residual

Terms again:
- **.blue[Exogenous]**: not predicted in the model (has no incoming single arrows)
- **.red[Endogenous]**: predicted by something (has incoming single arrows)

---

## Why path models?

1) **One coherent model**  
   - multiple regression equations estimated together (shared information)
   - direct vs indirect effects (mediation) is native, not an afterthought

2) **Focus on model comparison**  
   - test whether the *whole theory* reproduces relations in the full set of data  
   - compare nested models (drop or constrain paths) as competing theories

3) **Extensible to SEM**  
   - extensible to latent factors next week (measurement errors handled)

---

## Attention!

1) **We still need experiment designs and assumptions for causal claims**
  - temporal order, omitted confounds, measurement quality
  
2) **Equivalent models exist**
  - different diagrams can imply the same covariance structure
  - e.g., correlation or causation?
  
3) **“Model with good fit” is not truth**
  - it’s consistency with the covariance pattern, not proof of anything
  - "All models are wrong but some are useful" (Box, 1978)

---

## Identification and df (again)

- If a model is **just-identified** (df = 0), it fits perfectly by saturating all possible associations  
  - The estimated parameters are still informative, but fit indices are less so

- For most modeling practices, df &gt; 0 is a goal for model specification  
  - Imposing constraints (some paths fixed to 0 or a certain number), making the model more parsimonious (using fewer parameters to describe or summarize the info) while retaining acceptable fit

- Testing **theory-driven models** is better than taking a fully saturated model that exhausts every possible relationship as default

---

## lavaan specifications grammar

- **.yellow[Y ~ X + Z]**: Y predicted by X and Z

- **.yellow[Y ~ a*X + Z]**: assigning labels to certain parameters for dedicated estimations or constraints

- **.yellow[X ~~ Z]**: covariance (or residual covariance)

- **.yellow[X ~~ X]**: variance (usually automatically specified by wrapper functions)

- **.yellow[ind := a*b]**: a specific effect defined and estimated (computed from estimated paths)

---

## Mediation as a path model (concept)

Classic mediation:
- X → M → Y
- Direct effect: c' (X → Y controlling for M, as a "covariate")
- Indirect effect: a*b (X → M times M → Y)
- Total effect: c = c' + ab

Path modeling advantages:
- estimate **all** paths together and can define indirect effects directly 
- model comparisons to test competing hypothesis (e.g., with vs. without direct effect)
- bootstrap CIs (similar to bootstrapping method in mediation analysis)

## 1-mediator model in lavaan

Now let's reproduce the mediation model with "lavaan". Here, we will use the .red[sem()] function. It is another wrapper function in the "lavaan" package. Similar to .red[cfa()], it provides a set of default arguments that are designed for structural equation models (and path models).


``` r
m_med1 &lt;- "
anti  ~ a*symspan
raven ~ c1*symspan + b*anti

ind   := a*b
total := c1 + (a*b)
"

fit_med1 &lt;- sem(model = m_med1, data  = dat,
                se = "bootstrap", bootstrap = 100)

summary(fit_med1, standardized = TRUE,
        fit.measures = TRUE, rsquare = TRUE)
```

## Model comparison: full vs partial mediation

- Partial mediation model: the model in the previous diagram
- Full mediation model: an alternative model without the direct path (X → Y)
- Fit and compare the two models


``` r
m_med1_f &lt;- "
anti  ~ a*symspan
raven ~ b*anti  # No direct path nor the user-defined effects
"

fit_med1_f &lt;- sem(model = m_med1_f, data = dat,
                     se = "bootstrap", bootstrap = 100)

anova(fit_med1_f, fit_med1)

## The (manifest) variables for this model

Here I’ll use:
- "orient" as a Capacity measure
- "anti" as an "Attention Control" measure(same mediator as before)
- "pa" as a "Secondary Memory" measure

We will still use:
- "symspan" as the working memory measure
- "raven" as the fluid reasoning measure

---

## 3-mediator lavaan model


``` r
m_med3 &lt;- "
# a paths
anti ~ a1*symspan
pa ~ a2*symspan
orient ~ a3*symspan

# b paths + direct
raven ~ cprime*symspan + b1*anti + b2*pa + b3*orient

# defined effects
ind1 := a1*b1
ind2 := a2*b2
ind3 := a3*b3
ind_total := ind1 + ind2 + ind3
total := cprime + ind_total
"

fit_med3 &lt;- sem(model = m_med3, data  = dat,
                se = "bootstrap", bootstrap = 100)

summary(fit_med3, standardized = TRUE, fit.measures = TRUE, rsquare = TRUE)
```

## Other path model features

- Multiple outcomes simultaneously  
  - e.g., `Y1 ~ X + M`, `Y2 ~ X + M`, or you may try `Y1 + Y2 ~ X + M`
- Correlated residuals among variables  
  - when the assumption that variables share variance beyond modeled associations is needed
  - `X1 ~~ X2`
- Equality constraints  
  - test “are two effects equal?” by constraining coefficients
  - `Y ~ a*X1 + a*X2`

---

## Other path model features

You can even reproduce moderation investigations with path models (by using a ":" to specify the interaction).

&gt; Please try the following example, and compare the results between the lavaan path model and the regular linear regression model. Then use a robust estimator (e.g., "MLM") instead and compare again. What reflections do you have on these results?


``` r
m_mod &lt;- "
raven ~ anti + pa + anti:pa
"
fit_mod &lt;- sem(model = m_mod, data  = dat, estimator = "ML")

summary(fit_mod, standardized = T)
```

## Bridge to next week (SEM)

Today: path models (rectangles; observed variables)  
Next week: SEM (rectangles + circles)

Key upgrade:
- **Measurement error is modeled explicitly**
- Structural paths can be interpreted as relations among *latent constructs*

- Path model tests the **structural hypotheses** for theories; CFA tests the **measurement hypotheses** for theories; SEM combines them.
